<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>0h h1 Logic Puzzle</title>
    <style>
        :root {
            --bg-color: #e0e5ec;
            --text-color: #37474f;
            --empty-color: #e0e5ec;
            --shadow-dark: rgba(163, 177, 198, 0.7);
            --shadow-light: rgba(255, 255, 255, 0.9);
            --red-color: #d32f2f;
            --blue-color: #1976d2;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 상단 영역 (20%) */
        .header {
            height: 20%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }

        h1 { margin: 0; font-size: 2rem; font-weight: 800; letter-spacing: -1px; }
        #status { margin-top: 8px; font-size: 0.95rem; color: #78909c; height: 1.4rem; }

        /* 중앙 판 영역 (53%) - 버튼 공간 확보를 위해 아주 살짝 줄임 */
        .game-area {
            height: 53%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            width: 82vw;
            max-width: 300px;
            aspect-ratio: 1 / 1;
            padding: 15px;
            background: var(--bg-color);
            border-radius: 25px;
            box-shadow: 8px 8px 16px var(--shadow-dark), 
                        -8px -8px 16px var(--shadow-light);
            /* 터치 이벤트가 잘 전달되도록 보장 */
            position: relative;
            z-index: 1;
        }

        .cell {
            background-color: var(--empty-color);
            border-radius: 15px;
            box-shadow: inset 4px 4px 8px var(--shadow-dark), 
                        inset -4px -4px 8px var(--shadow-light);
            transition: all 0.1s ease;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            /* 중요: 터치 영역 확보 */
            position: relative; 
            z-index: 2;
        }

        .cell[data-state="1"] { 
            background-color: var(--red-color); 
            box-shadow: 4px 4px 8px rgba(211, 47, 47, 0.4), 
                        -2px -2px 6px rgba(255, 255, 255, 0.2);
        }
        .cell[data-state="2"] { 
            background-color: var(--blue-color); 
            box-shadow: 4px 4px 8px rgba(25, 118, 210, 0.4), 
                        -2px -2px 6px rgba(255, 255, 255, 0.2);
        }
        
        .cell:active { transform: scale(0.92); }

        /* 하단 영역 (27%) - 버튼 위치를 조금 더 내림 */
        .footer {
            height: 27%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center; /* 버튼을 중앙보다 살짝 아래로 유도 */
            padding-bottom: 20px; /* 바닥에서 약간 띄움 */
        }

        .controls {
            display: flex;
            gap: 15px;
            width: 82vw;
            max-width: 300px;
            margin-top: 10px; /* 판과의 간격을 아주 조금 더 줌 */
        }

        button {
            flex: 1;
            padding: 18px 0;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            background-color: var(--bg-color);
            color: var(--text-color);
            box-shadow: 5px 5px 10px var(--shadow-dark), 
                        -5px -5px 10px var(--shadow-light);
            -webkit-tap-highlight-color: transparent;
        }

        button#check-btn {
            background: linear-gradient(145deg, #2ecc71, #27ae60);
            color: white;
            box-shadow: 4px 4px 10px rgba(39, 174, 96, 0.3);
        }

        button:active {
            box-shadow: inset 2px 2px 5px var(--shadow-dark), 
                        inset -2px -2px 5px var(--shadow-light);
            transform: translateY(2px);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>0h h1</h1>
        <div id="status">빈칸을 터치해 보세요!</div>
    </div>
    
    <div class="game-area">
        <div id="grid"></div>
    </div>

    <div class="footer">
        <div class="controls">
            <button onclick="resetBoard()">초기화</button>
            <button id="check-btn" onclick="checkWin()">확인</button>
        </div>
    </div>

    <script>
        const size = 4;
        const gridElement = document.getElementById('grid');
        const statusElement = document.getElementById('status');
        let board = Array(size).fill().map(() => Array(size).fill(0));

        function createBoard() {
            gridElement.innerHTML = '';
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.state = 0;
                    // pointerdown으로 반응성 극대화
                    cell.addEventListener('pointerdown', (e) => {
                        e.preventDefault();
                        toggleCell(r, c, cell);
                    });
                    gridElement.appendChild(cell);
                }
            }
        }

        function toggleCell(r, c, element) {
            board[r][c] = (board[r][c] + 1) % 3;
            element.dataset.state = board[r][c];
            statusElement.innerText = "분석 중...";
            statusElement.style.color = "#78909c";
        }

        function resetBoard() {
            board = board.map(row => row.fill(0));
            document.querySelectorAll('.cell').forEach(c => c.dataset.state = 0);
            statusElement.innerText = "새 게임!";
        }

        function checkWin() {
            if (board.flat().includes(0)) {
                statusElement.innerText = "빈칸을 모두 채워주세요!";
                return;
            }

            let rowStrings = [];
            let colStrings = [];
            let isValid = true;

            for (let i = 0; i < size; i++) {
                let row = board[i];
                let col = board.map(r => r[i]);
                if (!checkLine(row) || !checkLine(col)) { isValid = false; break; }
                rowStrings.push(row.join(''));
                colStrings.push(col.join(''));
            }

            if (isValid && (new Set(rowStrings).size !== size || new Set(colStrings).size !== size)) {
                isValid = false;
            }

            if (isValid) {
                statusElement.innerText = "🎉 미션 성공! 완벽합니다!";
                statusElement.style.color = "#27ae60";
            } else {
                statusElement.innerText = "규칙에 맞지 않아요. 다시 시도!";
                statusElement.style.color = "#d32f2f";
            }
        }

        function checkLine(line) {
            const reds = line.filter(v => v === 1).length;
            const blues = line.filter(v => v === 2).length;
            if (reds !== size/2 || blues !== size/2) return false;

            for (let i = 0; i < line.length - 2; i++) {
                if (line[i] === line[i+1] && line[i] === line[i+2]) return false;
            }
            return true;
        }

        createBoard();
    </script>
</body>
</html>
