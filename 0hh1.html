<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>0h h1 Logic Puzzle</title>
    <style>
        :root {
            --bg-color: #e0e5ec;
            --text-color: #37474f;
            --shadow-dark: rgba(163, 177, 198, 0.7);
            --shadow-light: rgba(255, 255, 255, 0.9);
            --red-color: #d32f2f;
            --blue-color: #1976d2;
        }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        body { display: flex; flex-direction: column; align-items: center; }

        /* 상단 영역: 제목과 난이도 버튼 */
        .header {
            height: 22%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .title-wrapper {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        h1 { margin: 0; font-size: 1.8rem; font-weight: 800; }

        .size-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 12px;
            background: var(--bg-color);
            color: var(--text-color);
            font-weight: bold;
            font-size: 0.8rem;
            box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
            cursor: pointer;
        }

        .size-btn:active {
            box-shadow: inset 2px 2px 5px var(--shadow-dark), inset -2px -2px 5px var(--shadow-light);
        }

        #status { margin-top: 10px; font-size: 0.9rem; color: #78909c; height: 1.2rem; font-weight: 500; }

        /* 중앙 판 영역 */
        .game-area {
            height: 53%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #grid {
            display: grid;
            gap: 10px;
            width: 85vw;
            max-width: 340px;
            aspect-ratio: 1 / 1;
            padding: 15px;
            background: var(--bg-color);
            border-radius: 20px;
            box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
        }

        .cell {
            background-color: var(--bg-color);
            border-radius: 10px;
            box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
            transition: background-color 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        .cell[data-state="1"] { 
            background-color: var(--red-color); 
            box-shadow: 3px 3px 6px rgba(211, 47, 47, 0.3);
        }
        .cell[data-state="2"] { 
            background-color: var(--blue-color); 
            box-shadow: 3px 3px 6px rgba(25, 118, 210, 0.3);
        }

        /* 하단 영역 */
        .footer {
            height: 25%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 15px;
            width: 85vw;
            max-width: 340px;
        }

        .action-btn {
            flex: 1;
            padding: 18px 0;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            background: var(--bg-color);
            box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
        }

        #check-btn {
            background: linear-gradient(145deg, #2ecc71, #27ae60);
            color: white;
            box-shadow: 4px 4px 10px rgba(39, 174, 96, 0.3);
        }

        .action-btn:active {
            box-shadow: inset 2px 2px 5px var(--shadow-dark), inset -2px -2px 5px var(--shadow-light);
            transform: translateY(2px);
        }
    </style>
</head>
<body>

    <audio id="click-sound" src="effect 19.mp3" preload="auto"></audio>

    <div class="header">
        <div class="title-wrapper">
            <button class="size-btn" onclick="changeSize(6)">6x6</button>
            <h1>0h h1</h1>
            <button class="size-btn" onclick="changeSize(8)">8x8</button>
        </div>
        <div id="status">빈칸을 터치해 보세요!</div>
    </div>
    
    <div class="game-area">
        <div id="grid"></div>
    </div>

    <div class="footer">
        <div class="controls">
            <button class="action-btn" onclick="resetBoard()">초기화</button>
            <button id="check-btn" class="action-btn" onclick="checkWin()">확인</button>
        </div>
    </div>

    <script>
        let currentSize = 4;
        const gridElement = document.getElementById('grid');
        const statusElement = document.getElementById('status');
        let board = [];

        function changeSize(newSize) {
            currentSize = newSize;
            statusElement.innerText = `${newSize}x${newSize} 모드 시작!`;
            statusElement.style.color = "#78909c";
            initGame();
        }

        function initGame() {
            // 그리드 레이아웃 동적 변경
            gridElement.style.gridTemplateColumns = `repeat(${currentSize}, 1fr)`;
            board = Array(currentSize).fill().map(() => Array(currentSize).fill(0));
            
            gridElement.innerHTML = '';
            for (let r = 0; r < currentSize; r++) {
                for (let c = 0; c < currentSize; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.state = 0;
                    cell.addEventListener('pointerdown', (e) => {
                        e.preventDefault();
                        toggleCell(r, c, cell);
                    });
                    gridElement.appendChild(cell);
                }
            }
        }

        function toggleCell(r, c, element) {
// 효과음 재생 코드 추가
    const sound = document.getElementById('click-sound');
    sound.currentTime = 0; // 재생 위치 초기화 (연속 클릭 대응)
    sound.play();
            
            
            board[r][c] = (board[r][c] + 1) % 3;
            element.dataset.state = board[r][c];
        }

        function resetBoard() {
            initGame();
            statusElement.innerText = "보드가 초기화되었습니다.";
        }

        function checkWin() {
            if (board.flat().includes(0)) {
                statusElement.innerText = "모든 칸을 채워주세요!";
                return;
            }

            let rowStrings = [];
            let colStrings = [];
            let isValid = true;

            for (let i = 0; i < currentSize; i++) {
                let row = board[i];
                let col = board.map(r => r[i]);
                
                if (!checkLine(row) || !checkLine(col)) { isValid = false; break; }
                
                rowStrings.push(row.join(''));
                colStrings.push(col.join(''));
            }

            // 중복 줄 체크 (8x8에서 특히 중요)
            if (isValid && (new Set(rowStrings).size !== currentSize || new Set(colStrings).size !== currentSize)) {
                isValid = false;
            }

            if (isValid) {
                statusElement.innerText = `🎉 ${currentSize}x${currentSize} 클리어!`;
                statusElement.style.color = "#27ae60";
            } else {
                statusElement.innerText = "규칙 위반! 다시 확인해보세요.";
                statusElement.style.color = "#d32f2f";
            }
        }

        function checkLine(line) {
            const reds = line.filter(v => v === 1).length;
            const blues = line.filter(v => v === 2).length;
            if (reds !== currentSize/2 || blues !== currentSize/2) return false;

            for (let i = 0; i < line.length - 2; i++) {
                if (line[i] === line[i+1] && line[i] === line[i+2]) return false;
            }
            return true;
        }

        // 최초 실행
        initGame();

        // 브라우저 소리 잠금 해제를 위한 코드
document.addEventListener('pointerdown', function unlock() {
    const sound = document.getElementById('click-sound');
    sound.play().then(() => {
        // 성공적으로 재생되면 (무음 재생) 즉시 일시정지하고 위치 초기화
        sound.pause();
        sound.currentTime = 0;
        // 한 번만 실행되면 되므로 이벤트 리스너 제거
        document.removeEventListener('pointerdown', unlock);
    }).catch(error => {
        // 첫 터치 전에는 에러가 날 수 있지만 무시합니다.
        console.log("Audio waiting for user interaction");
    });
}, { once: true, capture: true }); // capture를 true로 설정하여 최우선 실행
        
    </script>
</body>
</html>
