<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neumorphic 2048</title>
    <style>
        :root {
            --bg-color: #e0e5ec;
            --text-color: #37474f;
            --shadow-dark: rgba(163, 177, 198, 0.7);
            --shadow-light: rgba(255, 255, 255, 0.9);
            
            --tile-2-bg: #e0e5ec; --tile-2-text: #78909c;
            --tile-4-bg: #dce1e9; --tile-4-text: #546e7a;
            --tile-8-bg: #ffb74d; --tile-8-text: white;
            --tile-16-bg: #ff9800; --tile-16-text: white;
            --tile-32-bg: #e57373; --tile-32-text: white;
            --tile-64-bg: #ef5350; --tile-64-text: white;
            --tile-128-bg: #fff176; --tile-128-text: #546e7a;
            --tile-256-bg: #ffee58; --tile-256-text: #546e7a;
            --tile-512-bg: #81d4fa; --tile-512-text: white;
            --tile-1024-bg: #29b6f6; --tile-1024-text: white;
            --tile-2048-bg: #66bb6a; --tile-2048-text: white;
        }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            user-select: none; -webkit-user-select: none;
            touch-action: none;
        }

        body { display: flex; flex-direction: column; align-items: center; }

        .header {
            height: 22%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            width: 100%;
        }

        h1 { margin: 0; font-size: 1.8rem; font-weight: 800; }

        .score-container {
            display: flex; gap: 20px; margin-top: 10px;
        }

        .score-box {
            padding: 8px 25px; border-radius: 12px;
            background: var(--bg-color); text-align: center;
            box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
            min-width: 85px;
        }

        .score-label { font-size: 0.65rem; color: #78909c; font-weight: 500; text-transform: uppercase; }
        .score-value { font-size: 1.1rem; font-weight: 700; margin-top: 1px; }

        .game-area {
            height: 53%; width: 100%;
            display: flex; justify-content: center; align-items: center;
        }

        #grid-container {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
            width: 85vw; max-width: 340px; aspect-ratio: 1 / 1;
            padding: 15px; background: var(--bg-color); border-radius: 20px;
            box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
            position: relative;
        }

        .grid-cell {
            background-color: var(--bg-color); border-radius: 10px;
            box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
        }

        .tile {
            position: absolute; display: flex;
            justify-content: center; align-items: center;
            font-size: 1.8rem; font-weight: 800; border-radius: 10px;
            /* 이동 애니메이션 속도 미세 조정 */
            transition: transform 0.1s ease-in-out, background-color 0.1s ease-in-out;
            box-shadow: 3px 3px 6px rgba(0,0,0,0.1);
            width: calc((100% - 30px - 36px) / 4); 
            height: calc((100% - 30px - 36px) / 4);
            /* 잔상 방지를 위해 left, top 제거 */
        }

        .tile-2 { background-color: var(--tile-2-bg); color: var(--tile-2-text); font-size: 2rem;}
        .tile-4 { background-color: var(--tile-4-bg); color: var(--tile-4-text); font-size: 2rem;}
        .tile-8 { background-color: var(--tile-8-bg); color: var(--tile-8-text); }
        .tile-16 { background-color: var(--tile-16-bg); color: var(--tile-16-text); }
        .tile-32 { background-color: var(--tile-32-bg); color: var(--tile-32-text); }
        .tile-64 { background-color: var(--tile-64-bg); color: var(--tile-64-text); }
        .tile-128 { background-color: var(--tile-128-bg); color: var(--tile-128-text); font-size: 1.4rem; }
        .tile-256 { background-color: var(--tile-256-bg); color: var(--tile-256-text); font-size: 1.4rem; }
        .tile-512 { background-color: var(--tile-512-bg); color: var(--tile-512-text); font-size: 1.4rem; }
        .tile-1024 { background-color: var(--tile-1024-bg); color: var(--tile-1024-text); font-size: 1.1rem; }
        .tile-2048 { background-color: var(--tile-2048-bg); color: var(--tile-2048-text); font-size: 1.1rem; box-shadow: 0 0 15px rgba(102, 187, 106, 0.5); }

        /* 새로운 애니메이션: 음각으로 들어갔다가 튀어나오는 효과 */
        @keyframes neumorphicPop {
            0% {
                opacity: 0;
                transform: scale(0.8) translate(var(--pos-x), var(--pos-y));
                box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light);
            }
            50% {
                opacity: 1;
                transform: scale(1.1) translate(var(--pos-x), var(--pos-y));
                box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
            }
            100% {
                opacity: 1;
                transform: scale(1) translate(var(--pos-x), var(--pos-y));
                box-shadow: 3px 3px 6px rgba(0,0,0,0.1);
            }
        }
        
        .tile-new {
            /* 이동 애니메이션과 겹치지 않도록 생성 시에만 적용 */
            animation: neumorphicPop 0.3s ease-out;
            /* 애니메이션 중 위치 고정을 위해 필요 */
            animation-fill-mode: both;
        }

        .footer {
            height: 25%; width: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding-bottom: 20px;
        }

        #status { margin-bottom: 15px; font-size: 0.9rem; color: #78909c; height: 1.2rem; font-weight: 500; }

        .controls {
            display: flex; justify-content: center;
            width: 85vw; max-width: 340px;
        }

        .action-btn {
            width: 70%;
            padding: 18px 0; border: none; border-radius: 15px;
            font-size: 1.1rem; font-weight: 700;
            background: var(--bg-color); color: var(--text-color);
            box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
            cursor: pointer; transition: transform 0.1s;
        }

        #restart-btn {
            background: linear-gradient(145deg, #ff9800, #f57c00);
            color: white; box-shadow: 4px 4px 10px rgba(245, 124, 0, 0.3);
        }

        .action-btn:active {
            box-shadow: inset 2px 2px 5px var(--shadow-dark), inset -2px -2px 5px var(--shadow-light);
            transform: translateY(2px);
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="title-wrapper"><h1>2048</h1></div>
        <div class="score-container">
            <div class="score-box"><div class="score-label">Score</div><div id="score" class="score-value">0</div></div>
            <div class="score-box"><div class="score-label">Best</div><div id="best-score" class="score-value">0</div></div>
        </div>
    </div>
    
    <div class="game-area">
        <div id="grid-container">
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        </div>
    </div>

    <div class="footer">
        <div id="status">화면을 쓸어넘겨 숫자를 합치세요!</div>
        <div class="controls">
            <button id="restart-btn" class="action-btn" onclick="startGame()">새 게임</button>
        </div>
    </div>

    <script>
        const gridContainer = document.getElementById('grid-container');
        const scoreElement = document.getElementById('score');
        const bestScoreElement = document.getElementById('best-score');
        const statusElement = document.getElementById('status');

        let board = [];
        let score = 0;
        let bestScore = localStorage.getItem('bestScore2048') || 0;
        let isGameOver = false;

        bestScoreElement.innerText = bestScore;

        function startGame() {
            gridContainer.querySelectorAll('.tile').forEach(tile => tile.remove());
            board = Array(4).fill().map(() => Array(4).fill(0));
            score = 0; updateScore(0);
            isGameOver = false;
            statusElement.innerText = "게임을 시작합니다!";
            statusElement.style.color = "#78909c";
            addRandomTile(); addRandomTile();
        }

        function addRandomTile() {
            let cells = [];
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (board[r][c] === 0) cells.push({r, c});
                }
            }
            if (cells.length > 0) {
                let {r, c} = cells[Math.floor(Math.random() * cells.length)];
                board[r][c] = Math.random() < 0.9 ? 2 : 4;
                // 약간의 지연 우 새로운 타일 생성 (이동 애니메이션 후)
                setTimeout(() => drawTile(r, c, board[r][c], true), 100);
            }
        }

        function drawTile(r, c, value, isNew = false) {
            const tile = document.createElement('div');
            tile.className = `tile tile-${value}`;
            tile.innerText = value;
            
            const gap = 12;
            const padding = 15;
            
            // 좌표 계산
            const x = `calc(${padding}px + ${c * 100}% + ${c * gap}px)`;
            const y = `calc(${padding}px + ${r * 100}% + ${r * gap}px)`;
            
            // 위치 즉시 할당 (잔상 제거 핵심)
            tile.style.transform = `translate(${x}, ${y})`;
            
            if (isNew) {
                // 애니메이션용 CSS 변수 설정
                tile.style.setProperty('--pos-x', x);
                tile.style.setProperty('--pos-y', y);
                tile.classList.add('tile-new');
            }
            
            gridContainer.appendChild(tile);
        }

        function updateScore(newScore) {
            score = newScore;
            scoreElement.innerText = score;
            if (score > bestScore) {
                bestScore = score;
                bestScoreElement.innerText = bestScore;
                localStorage.setItem('bestScore2048', bestScore);
            }
        }

        function slide(row) {
            let arr = row.filter(val => val);
            for (let i = 0; i < arr.length - 1; i++) {
                if (arr[i] === arr[i+1]) {
                    arr[i] *= 2;
                    updateScore(score + arr[i]);
                    if (arr[i] === 2048) statusElement.innerText = "🎉 2048 달성!";
                    arr.splice(i + 1, 1);
                }
            }
            while (arr.length < 4) arr.push(0);
            return arr;
        }

        function handleMove(direction) {
            if (isGameOver) return;
            let oldBoard = JSON.stringify(board);

            if (direction === 'left' || direction === 'right') {
                for (let r = 0; r < 4; r++) {
                    let row = board[r];
                    if (direction === 'right') row.reverse();
                    let newRow = slide(row);
                    if (direction === 'right') newRow.reverse();
                    board[r] = newRow;
                }
            } else {
                for (let c = 0; c < 4; c++) {
                    let col = [board[0][c], board[1][c], board[2][c], board[3][c]];
                    if (direction === 'down') col.reverse();
                    let newCol = slide(col);
                    if (direction === 'down') newCol.reverse();
                    for (let r = 0; r < 4; r++) board[r][c] = newCol[r];
                }
            }

            if (oldBoard !== JSON.stringify(board)) {
                // 기존 타일 지우기 전 이동 애니메이션 시간 확보
                setTimeout(() => {
                    gridContainer.querySelectorAll('.tile:not(.tile-new)').forEach(tile => tile.remove());
                    for (let r = 0; r < 4; r++) {
                        for (let c = 0; c < 4; c++) {
                            if (board[r][c] !== 0) drawTile(r, c, board[r][c]);
                        }
                    }
                    // 애니메이션 중복 방지를 위해 기존 '.tile-new' 제거
                    gridContainer.querySelectorAll('.tile-new').forEach(tile => tile.classList.remove('tile-new'));
                }, 100); 

                addRandomTile();
                setTimeout(checkGameOver, 300);
            }
        }

        function checkGameOver() {
            if (board.flat().includes(0)) return;
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (c < 3 && board[r][c] === board[r][c+1]) return;
                    if (r < 3 && board[r][c] === board[r+1][c]) return;
                }
            }
            isGameOver = true;
            statusElement.innerText = "게임 오버! 다시 시작해보세요.";
            statusElement.style.color = "#d32f2f";
        }

        let touchStartX, touchStartY;
        window.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: false });

        window.addEventListener('touchmove', e => {
            if (touchStartX && touchStartY) e.preventDefault();
        }, { passive: false });

        window.addEventListener('touchend', e => {
            if (!touchStartX || !touchStartY) return;
            let dx = e.changedTouches[0].clientX - touchStartX;
            let dy = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(dx) > 30 || Math.abs(dy) > 30) {
                if (Math.abs(dx) > Math.abs(dy)) handleMove(dx > 0 ? 'right' : 'left');
                else handleMove(dy > 0 ? 'down' : 'up');
            }
            touchStartX = null; touchStartY = null;
        });

        startGame();
    </script>
</body>
</html>
