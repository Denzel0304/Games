<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logic Puzzle 0h h1</title>
    <style>
        :root {
            --bg-color: #2c3e50;
            --empty-color: #34495e;
            --red-color: #e74c3c;
            --blue-color: #3498db;
            --text-color: #ecf0f1;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            touch-action: manipulation; /* 더블탭 확대 방지 */
        }

        h1 { margin-bottom: 10px; font-size: 1.5rem; }

        #status {
            height: 30px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            color: #bdc3c7;
        }

        /* 모바일 화면 크기에 맞춘 그리드 */
        #grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            width: 90vw;
            max-width: 350px;
            aspect-ratio: 1 / 1;
        }

        .cell {
            background-color: var(--empty-color);
            border-radius: 12%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.15s ease;
            -webkit-tap-highlight-color: transparent; /* 모바일 터치 하이라이트 제거 */
        }

        .cell[data-state="1"] { background-color: var(--red-color); }
        .cell[data-state="2"] { background-color: var(--blue-color); }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background-color: #95a5a6;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        button#check-btn { background-color: #27ae60; }
        button:active { opacity: 0.8; transform: scale(0.95); }
    </style>
</head>
<body>

    <h1>Logic Puzzle</h1>
    <div id="status">칸을 터치해 색을 바꾸세요</div>
    
    <div id="grid"></div>

    <div class="controls">
        <button onclick="resetBoard()">초기화</button>
        <button id="check-btn" onclick="checkWin()">정답 확인</button>
    </div>

    <script>
        const size = 4;
        const gridElement = document.getElementById('grid');
        const statusElement = document.getElementById('status');
        let board = Array(size).fill().map(() => Array(size).fill(0));

        function createBoard() {
            gridElement.innerHTML = '';
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.state = 0;
                    // 모바일 대응: click 대신 pointerdown이 더 즉각적임
                    cell.onpointerdown = (e) => {
                        e.preventDefault();
                        toggleCell(r, c, cell);
                    };
                    gridElement.appendChild(cell);
                }
            }
        }

        function toggleCell(r, c, element) {
            board[r][c] = (board[r][c] + 1) % 3;
            element.dataset.state = board[r][c];
            statusElement.innerText = "분석 중...";
        }

        function resetBoard() {
            board = Array(size).fill().map(() => Array(size).fill(0));
            const cells = document.querySelectorAll('.cell');
            cells.forEach(c => c.dataset.state = 0);
            statusElement.innerText = "보드가 초기화되었습니다";
        }

        function checkWin() {
            if (board.flat().includes(0)) {
                statusElement.innerText = "모든 칸을 채워야 합니다!";
                return;
            }

            if (validateBoard()) {
                statusElement.innerText = "🎉 완벽한 논리입니다!";
                statusElement.style.color = "#2ecc71";
            } else {
                statusElement.innerText = "규칙 위반! 다시 생각해보세요.";
                statusElement.style.color = "#e74c3c";
            }
        }

        function validateBoard() {
            // 중복 줄 검사를 위한 배열 저장소
            let rowStrings = [];
            let colStrings = [];

            for (let i = 0; i < size; i++) {
                let row = board[i];
                let col = board.map(r => r[i]);
                
                // 기본 규칙 검사 (개수, 3연속)
                if (!checkLine(row) || !checkLine(col)) return false;

                // 중복 줄 규칙 검사 준비
                rowStrings.push(row.join(''));
                colStrings.push(col.join(''));
            }

            // 고유성 검사 (똑같은 줄이 있는지)
            if (new Set(rowStrings).size !== size) return false;
            if (new Set(colStrings).size !== size) return false;

            return true;
        }

        function checkLine(line) {
            const reds = line.filter(v => v === 1).length;
            const blues = line.filter(v => v === 2).length;
            if (reds !== size/2 || blues !== size/2) return false;

            for (let i = 0; i < line.length - 2; i++) {
                if (line[i] === line[i+1] && line[i] === line[i+2]) return false;
            }
            return true;
        }

        createBoard();
    </script>
</body>
</html>
