<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>0h h1 Logic Puzzle</title>
    <style>
        :root {
            --bg-color: #2c3e50;
            --empty-color: #34495e;
            --red-color: #e74c3c;
            --blue-color: #3498db;
            --text-color: #ecf0f1;
        }

        /* 전체 화면 설정 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: sans-serif;
            overflow: hidden; /* 스크롤 절대 방지 */
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 상단: 제목 영역 (전체 높이의 약 20%) */
        .header {
            height: 20%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }

        h1 { margin: 0; font-size: 1.8rem; letter-spacing: 3px; }
        #status { margin-top: 10px; font-size: 0.9rem; color: #bdc3c7; height: 1.2rem; }

        /* 중앙: 게임판 영역 (전체 높이의 약 55%) */
        .game-area {
            height: 55%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 80vw;
            max-width: 300px;
            aspect-ratio: 1 / 1;
        }

        .cell {
            background-color: var(--empty-color);
            border-radius: 18%;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
            -webkit-tap-highlight-color: transparent;
        }

        .cell[data-state="1"] { background-color: var(--red-color); }
        .cell[data-state="2"] { background-color: var(--blue-color); }

        /* 하단: 조작 영역 (전체 높이의 약 25%) */
        .footer {
            height: 25%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* 버튼이 너무 바닥에 붙지 않게 상단 정렬 */
            padding-top: 10px;
        }

        .controls {
            display: flex;
            gap: 15px;
            width: 80vw;
            max-width: 300px;
        }

        button {
            flex: 1;
            padding: 18px 0;
            border: none;
            border-radius: 12px;
            background-color: #5d6d7e;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            box-shadow: 0 4px #34495e;
            cursor: pointer;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px #34495e;
        }

        #check-btn {
            background-color: #27ae60;
            box-shadow: 0 4px #1e8449;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>0H H1</h1>
        <div id="status">빈칸을 터치해 보세요!</div>
    </div>
    
    <div class="game-area">
        <div id="grid"></div>
    </div>

    <div class="footer">
        <div class="controls">
            <button onclick="resetBoard()">초기화</button>
            <button id="check-btn" onclick="checkWin()">확인</button>
        </div>
    </div>

    <script>
        const size = 4;
        const gridElement = document.getElementById('grid');
        const statusElement = document.getElementById('status');
        let board = Array(size).fill().map(() => Array(size).fill(0));

        function createBoard() {
            gridElement.innerHTML = '';
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.state = 0;
                    cell.onpointerdown = (e) => {
                        e.preventDefault();
                        toggleCell(r, c, cell);
                    };
                    gridElement.appendChild(cell);
                }
            }
        }

        function toggleCell(r, c, element) {
            board[r][c] = (board[r][c] + 1) % 3;
            element.dataset.state = board[r][c];
        }

        function resetBoard() {
            board = board.map(row => row.fill(0));
            document.querySelectorAll('.cell').forEach(c => c.dataset.state = 0);
            statusElement.innerText = "새 게임!";
            statusElement.style.color = "#bdc3c7";
        }

        function checkWin() {
            if (board.flat().includes(0)) {
                statusElement.innerText = "빈칸을 모두 채워주세요!";
                return;
            }

            let rowStrings = [];
            let colStrings = [];
            let isValid = true;

            for (let i = 0; i < size; i++) {
                let row = board[i];
                let col = board.map(r => r[i]);
                if (!checkLine(row) || !checkLine(col)) { isValid = false; break; }
                rowStrings.push(row.join(''));
                colStrings.push(col.join(''));
            }

            if (isValid && (new Set(rowStrings).size !== size || new Set(colStrings).size !== size)) {
                isValid = false;
            }

            if (isValid) {
                statusElement.innerText = "🎉 성공! 완벽합니다!";
                statusElement.style.color = "#2ecc71";
            } else {
                statusElement.innerText = "규칙을 다시 확인해보세요!";
                statusElement.style.color = "#e74c3c";
            }
        }

        function checkLine(line) {
            const reds = line.filter(v => v === 1).length;
            const blues = line.filter(v => v === 2).length;
            if (reds !== size/2 || blues !== size/2) return false;

            for (let i = 0; i < line.length - 2; i++) {
                if (line[i] === line[i+1] && line[i] === line[i+2]) return false;
            }
            return true;
        }

        createBoard();
    </script>
</body>
</html>
