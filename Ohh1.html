<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>0h h1 Logic Puzzle</title>
    <style>
        :root {
            --bg-color: #2c3e50;
            --empty-color: #34495e;
            --red-color: #e74c3c;
            --blue-color: #3498db;
            --text-color: #ecf0f1;
        }

        body {
            margin: 0;
            padding: 10px; /* 여백 축소 */
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* 상단부터 배치 */
            min-height: 100vh;
            overflow: hidden; /* 스크롤 방지 */
        }

        h1 { 
            margin: 10px 0 5px 0; /* 제목 위로 밀기 */
            font-size: 1.2rem; 
        }

        #status {
            height: 20px;
            margin-bottom: 10px;
            font-size: 0.85rem;
            color: #bdc3c7;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            width: 85vw; /* 폭 약간 줄임 */
            max-width: 300px;
            aspect-ratio: 1 / 1;
        }

        .cell {
            background-color: var(--empty-color);
            border-radius: 15%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        .cell[data-state="1"] { background-color: var(--red-color); }
        .cell[data-state="2"] { background-color: var(--blue-color); }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background-color: #7f8c8d;
            color: white;
            font-size: 0.9rem;
            font-weight: bold;
        }

        button#check-btn { background-color: #27ae60; }
    </style>
</head>
<body>

    <h1>0h h1 퍼즐</h1>
    <div id="status">빈칸을 눌러 색을 채우세요!</div>
    
    <div id="grid"></div>

    <div class="controls">
        <button onclick="resetBoard()">초기화</button>
        <button id="check-btn" onclick="checkWin()">정답 확인</button>
    </div>

    <script>
        const size = 4;
        const gridElement = document.getElementById('grid');
        const statusElement = document.getElementById('status');
        let board = Array(size).fill().map(() => Array(size).fill(0));

        function createBoard() {
            gridElement.innerHTML = '';
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.state = 0;
                    cell.onpointerdown = (e) => {
                        e.preventDefault();
                        toggleCell(r, c, cell);
                    };
                    gridElement.appendChild(cell);
                }
            }
        }

        function toggleCell(r, c, element) {
            board[r][c] = (board[r][c] + 1) % 3;
            element.dataset.state = board[r][c];
        }

        function resetBoard() {
            board = board.map(row => row.fill(0));
            document.querySelectorAll('.cell').forEach(c => c.dataset.state = 0);
            statusElement.innerText = "다시 시작합니다!";
            statusElement.style.color = "#bdc3c7";
        }

        function checkWin() {
            if (board.flat().includes(0)) {
                statusElement.innerText = "빈칸을 모두 채워주세요!";
                return;
            }

            let rowStrings = [];
            let colStrings = [];
            let isValid = true;

            for (let i = 0; i < size; i++) {
                let row = board[i];
                let col = board.map(r => r[i]);
                
                if (!checkLine(row) || !checkLine(col)) { isValid = false; break; }

                rowStrings.push(row.join(''));
                colStrings.push(col.join(''));
            }

            if (isValid && (new Set(rowStrings).size !== size || new Set(colStrings).size !== size)) {
                isValid = false;
            }

            if (isValid) {
                statusElement.innerText = "🎉 대단해요! 성공입니다!";
                statusElement.style.color = "#2ecc71";
            } else {
                statusElement.innerText = "규칙을 다시 확인해보세요! (3연속 NO, 2:2 YES)";
                statusElement.style.color = "#e74c3c";
            }
        }

        function checkLine(line) {
            const reds = line.filter(v => v === 1).length;
            const blues = line.filter(v => v === 2).length;
            if (reds !== size/2 || blues !== size/2) return false;

            for (let i = 0; i < line.length - 2; i++) {
                if (line[i] === line[i+1] && line[i] === line[i+2]) return false;
            }
            return true;
        }

        createBoard();
    </script>
</body>
</html>
