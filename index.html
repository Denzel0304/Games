<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Healing Games</title>
    <style>
        :root {
            --bg-color: #e3f2fd;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-sub: #7f8c8d;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Pretendard', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            margin-top: 50px;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            color: #1a3a5a;
            margin: 0;
            letter-spacing: -1px;
        }

        p {
            font-size: 14px;
            color: var(--text-sub);
            margin-top: 8px;
        }

        .date-badge {
            margin-top: 20px;
            background: white;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 14px;
            color: #546e7a;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            font-weight: 600;
        }

        /* 그리드 레이아웃 */
        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 40px 20px;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }

        /* 메뉴 카드 스타일 */
        .menu-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 25px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid rgba(255,255,255,0.5);
            position: relative;
            overflow: hidden;
        }

        .menu-card:active {
            transform: scale(0.95);
        }

        .icon-box {
            width: 65px;
            height: 65px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin-bottom: 12px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-main);
        }

        /* 개별 카드 색상 및 효과 */
        .star-game { border-top: 5px solid #ffeb3b; }
        .star-game .icon-box { background-color: #fff9c4; }

        .preparing { border-top: 5px solid #cfd8dc; opacity: 0.7; }
        .preparing .icon-box { background-color: #eceff1; }
        .preparing .card-title { color: #90a4ae; }

        .status-tag {
            font-size: 10px;
            margin-top: 5px;
            color: #b0bec5;
        }
    </style>
</head>
<body>

    <header>
        <h1>Healing Games</h1>
        <p>오늘도 마음을 비우고, 가볍게 즐기세요.</p>
        <div class="date-badge" id="current-date">2026년 4월 3일 (금)</div>
    </header>

    <div class="container">
        <a href="Stars.html" class="menu-card star-game">
            <div class="icon-box">✨</div>
            <div class="card-title">별 가르기</div>
        </a>

        <div class="menu-card preparing">
            <div class="icon-box">🍵</div>
            <div class="card-title">준비 중</div>
            <div class="status-tag">Coming Soon</div>
        </div>

        <div class="menu-card preparing">
            <div class="icon-box">🌊</div>
            <div class="card-title">준비 중</div>
            <div class="status-tag">Coming Soon</div>
        </div>

        <div class="menu-card preparing">
            <div class="icon-box">☁️</div>
            <div class="card-title">준비 중</div>
            <div class="status-tag">Coming Soon</div>
        </div>
    </div>

    <script>
        // 오늘 날짜 표시 (자동 업데이트)
        const d = new Date();
        const week = ['일', '월', '화', '수', '목', '금', '토'];
        const dateStr = `${d.getFullYear()}년 ${d.getMonth() + 1}월 ${d.getDate()}일 (${week[d.getDay()]})`;
        document.getElementById('current-date').innerText = dateStr;
    </script>
</body>
</html>
