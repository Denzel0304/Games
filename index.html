<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>별 가르기 - 레벨업 버전</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050510; touch-action: none; font-family: 'Pretendard', sans-serif; }
        canvas { display: block; }
        
        /* 헤더 UI */
        #header {
            position: absolute; top: 0; left: 0; width: 100%; height: 60px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; box-sizing: border-box; background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px); color: white; z-index: 10;
        }
        .stats { font-size: 14px; font-weight: 300; letter-spacing: 1px; }
        .stats span { font-weight: bold; color: #ffeb3b; margin-right: 10px; }
        
        #reset-btn {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3);
            color: white; padding: 6px 12px; border-radius: 20px; font-size: 12px;
            cursor: pointer; transition: 0.3s;
        }
        #reset-btn:active { background: rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body>
    <div id="header">
        <div class="stats">
            Level <span id="level">1</span>
            Stars <span id="score">0</span>
        </div>
        <button id="reset-btn" onclick="location.reload()">다시 하기</button>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const levelEl = document.getElementById('level');
        const scoreEl = document.getElementById('score');

        let fallingStars = [];
        let debris = [];
        let mouse = { x: null, y: null, active: false };
        let score = 0;
        let level = 1;

        // 색상 후보군 (흰색, 푸른색, 노란색)
        const colors = [
            'hsla(0, 0%, 100%, 1)',    // 흰색
            'hsla(200, 100%, 80%, 1)',  // 푸른색
            'hsla(50, 100%, 75%, 1)',   // 노란색
            'hsla(180, 100%, 85%, 1)'   // 시안
        ];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class FallingStar {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = -50;
                this.size = Math.random() * 3 + 3;
                
                // 초기 속도 낮게 설정 + 레벨에 따른 가속
                const baseSpeed = 0.8 + (level * 0.2);
                this.speedY = baseSpeed + Math.random() * 0.5;
                
                // 사선 낙하를 위한 X축 속도 (좌우 랜덤)
                this.speedX = (Math.random() - 0.5) * 1.2; 
                
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.broken = false;
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;

                // 벽에 부딪히면 튕기기
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;

                if (mouse.active && !this.broken) {
                    const dx = this.x - mouse.x;
                    const dy = this.y - mouse.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 25) { 
                        this.broken = true;
                        this.explode();
                        updateScore();
                    }
                }
            }
            draw() {
                if (this.broken) return;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
            explode() {
                const count = 12;
                for (let i = 0; i < count; i++) {
                    debris.push(new Debris(this.x, this.y, this.color));
                }
            }
        }

        class Debris {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 2 + 1;
                this.speedX = (Math.random() - 0.5) * 6;
                this.speedY = (Math.random() - 0.5) * 6;
                this.color = color;
                this.life = 1.0;
                this.decay = 0.02;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += 0.1; // 중력
                this.life -= this.decay;
            }
            draw() {
                ctx.fillStyle = this.color.replace('1)', `${this.life})`);
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function updateScore() {
            score++;
            scoreEl.innerText = score;
            // 10개마다 레벨업
            if (score % 10 === 0) {
                level++;
                levelEl.innerText = level;
            }
        }

        function handleInput(e) {
            mouse.active = true;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            mouse.x = clientX;
            mouse.y = clientY;
        }

        window.addEventListener('mousemove', handleInput);
        window.addEventListener('touchmove', (e) => {
            e.preventDefault(); // 스크롤 방지
            handleInput(e);
        }, { passive: false });
        window.addEventListener('touchend', () => mouse.active = false);
        window.addEventListener('mouseup', () => mouse.active = false);

        function animate() {
            ctx.fillStyle = 'rgba(5, 5, 16, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 레벨에 따라 별 생성 빈도 조절
            const spawnChance = 0.015 + (level * 0.005);
            if (Math.random() < Math.min(spawnChance, 0.1)) {
                fallingStars.push(new FallingStar());
            }

            fallingStars.forEach((star, i) => {
                star.update();
                star.draw();
                if (star.y > canvas.height + 50 || star.broken) {
                    fallingStars.splice(i, 1);
                }
            });

            debris.forEach((p, i) => {
                p.update();
                p.draw();
                if (p.life <= 0) debris.splice(i, 1);
            });

            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
