<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>별 가르기 - 속도 고정 버전</title>
    <style>
        body { margin: 0; overflow: hidden; background: #010105; touch-action: none; font-family: 'Pretendard', sans-serif; }
        canvas { display: block; }
        #header {
            position: absolute; top: 0; left: 0; width: 100%; height: 65px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; box-sizing: border-box; background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px); color: white; z-index: 10;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .stats-group { display: flex; flex-direction: column; }
        .stats { font-size: 14px; font-weight: 600; color: #fff; }
        .stats span { color: #ffeb3b; }
        .best-label { font-size: 11px; color: #00d2ff; font-weight: 400; opacity: 0.8; }
        #reset-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 7px 14px; border-radius: 6px; font-size: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="header">
        <div class="stats-group">
            <div class="stats">LV.<span id="level">1</span> STARS <span id="score">0</span></div>
            <div class="best-label">BEST: <span id="best">0</span></div>
        </div>
        <button id="reset-btn" onclick="location.reload()">다시 하기</button>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const levelEl = document.getElementById('level');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');

        let fallingStars = [];
        let debris = [];
        let mouse = { x: null, y: null, active: false };
        let score = 0;
        let level = 1;
        let bestScore = localStorage.getItem('starBestScore') || 0;
        bestEl.innerText = bestScore;

        const colors = ['#ffffff', '#a2d2ff', '#ffe66d', '#caf0f8'];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class FallingStar {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = -20;
                this.size = Math.random() * 2 + 2.5;
                
                // 속도 값을 고정 상수로 관리 (드래그 영향을 받지 않음)
                this.baseVY = 0.6 + (level * 0.12); 
                this.speedY = this.baseVY + (Math.random() * 0.3);
                this.speedX = (Math.random() - 0.5) * 0.6; 
                
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.broken = false;
            }

            update() {
                // 드래그 상태와 상관없이 매 프레임 정해진 속도만큼만 이동
                this.y += this.speedY;
                this.x += this.speedX;

                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;

                // 충돌 감지 로직을 별의 이동 로직과 분리
                if (mouse.active && !this.broken) {
                    const dx = this.x - mouse.x;
                    const dy = this.y - mouse.y;
                    const distSq = dx*dx + dy*dy; // 성능을 위해 제곱근 생략
                    if (distSq < 900) { // 30px의 제곱인 900
                        this.broken = true;
                        this.explode();
                        updateScore();
                    }
                }
            }

            draw() {
                if (this.broken) return;
                ctx.save();
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            explode() {
                for (let i = 0; i < 12; i++) {
                    debris.push(new Debris(this.x, this.y, this.color));
                }
            }
        }

        class Debris {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 1.5 + 1;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
                this.color = color;
                this.life = 1.0;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.05; // 중력
                this.life -= 0.02;
            }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        function updateScore() {
            score++;
            scoreEl.innerText = score;
            if (score > bestScore) {
                bestScore = score;
                bestEl.innerText = bestScore;
                localStorage.setItem('starBestScore', bestScore);
            }
            level = Math.floor(score / 100) + 1;
            levelEl.innerText = level;
        }

        // 입력 처리 최적화
        function setMousePos(e) {
            const t = e.touches ? e.touches[0] : e;
            mouse.x = t.clientX;
            mouse.y = t.clientY;
        }

        window.addEventListener('mousedown', (e) => { mouse.active = true; setMousePos(e); });
        window.addEventListener('mousemove', (e) => { if (mouse.active) setMousePos(e); });
        window.addEventListener('mouseup', () => { mouse.active = false; });
        
        window.addEventListener('touchstart', (e) => { 
            mouse.active = true; 
            setMousePos(e); 
        }, { passive: false });
        
        window.addEventListener('touchmove', (e) => { 
            e.preventDefault(); 
            setMousePos(e); 
        }, { passive: false });
        
        window.addEventListener('touchend', () => { mouse.active = false; });

        function animate() {
            // 잔상 효과를 주면서 배경 초기화
            ctx.fillStyle = 'rgba(1, 1, 5, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 레벨에 따른 생성 빈도
            if (Math.random() < 0.01 + (level * 0.002)) {
                fallingStars.push(new FallingStar());
            }

            // 별 업데이트 및 그리기
            for (let i = fallingStars.length - 1; i >= 0; i--) {
                fallingStars[i].update();
                fallingStars[i].draw();
                if (fallingStars[i].y > canvas.height + 20 || fallingStars[i].broken) {
                    fallingStars.splice(i, 1);
                }
            }

            // 파티클 업데이트 및 그리기
            for (let i = debris.length - 1; i >= 0; i--) {
                debris[i].update();
                debris[i].draw();
                if (debris[i].life <= 0) debris.splice(i, 1);
            }

            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
