<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>별 가르기 - 마스터 버전</title>
    <style>
        body { margin: 0; overflow: hidden; background: #02020a; touch-action: none; font-family: 'Pretendard', -apple-system, sans-serif; }
        canvas { display: block; }
        
        #header {
            position: absolute; top: 0; left: 0; width: 100%; height: 70px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; box-sizing: border-box; background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px); color: white; z-index: 10;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .stats-group { display: flex; flex-direction: column; gap: 2px; }
        .stats { font-size: 13px; font-weight: 300; color: rgba(255,255,255,0.7); }
        .stats span { font-weight: 700; color: #ffeb3b; }
        .best-label { font-size: 11px; color: #00d2ff; text-transform: uppercase; letter-spacing: 1px; }

        #reset-btn {
            background: transparent; border: 1px solid rgba(255, 255, 255, 0.4);
            color: white; padding: 8px 16px; border-radius: 8px; font-size: 12px;
            cursor: pointer; transition: all 0.2s;
        }
        #reset-btn:active { background: white; color: black; }
    </style>
</head>
<body>
    <div id="header">
        <div class="stats-group">
            <div class="stats">Lv.<span id="level">1</span> Stars <span id="score">0</span></div>
            <div class="best-label">Best: <span id="best">0</span></div>
        </div>
        <button id="reset-btn" onclick="location.reload()">다시 하기</button>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const levelEl = document.getElementById('level');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');

        let fallingStars = [];
        let debris = [];
        let mouse = { x: null, y: null, active: false };
        let score = 0;
        let level = 1;
        
        // 최고 점수 불러오기 (캐시 활용)
        let bestScore = localStorage.getItem('starBestScore') || 0;
        bestEl.innerText = bestScore;

        const colors = [
            'hsla(0, 0%, 100%, 1)',    // 흰색
            'hsla(190, 100%, 75%, 1)', // 라이트 블루
            'hsla(45, 100%, 70%, 1)',  // 골드
            'hsla(210, 100%, 85%, 1)'  // 실버 블루
        ];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class FallingStar {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = -50;
                this.size = Math.random() * 2.5 + 2.5;
                
                // 레벨업 속도 밸런스 조정: 초기 속도를 더 낮추고 증가폭을 완만하게 함
                const baseSpeed = 0.5 + (level * 0.15);
                this.speedY = baseSpeed + Math.random() * 0.4;
                this.speedX = (Math.random() - 0.5) * 0.8; 
                
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.broken = false;
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;

                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;

                if (mouse.active && !this.broken) {
                    const dx = this.x - mouse.x;
                    const dy = this.y - mouse.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 30) { // 터치 판정 살짝 넉넉하게 조정
                        this.broken = true;
                        this.explode();
                        updateScore();
                    }
                }
            }
            draw() {
                if (this.broken) return;
                ctx.save();
                ctx.shadowBlur = 12;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
            explode() {
                for (let i = 0; i < 15; i++) {
                    debris.push(new Debris(this.x, this.y, this.color));
                }
            }
        }

        class Debris {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 2 + 1;
                this.speedX = (Math.random() - 0.5) * 5;
                this.speedY = (Math.random() - 0.5) * 5;
                this.color = color;
                this.life = 1.0;
                this.decay = 0.015 + Math.random() * 0.01;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += 0.08;
                this.life -= this.decay;
            }
            draw() {
                ctx.fillStyle = this.color.replace('1)', `${this.life})`);
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function updateScore() {
            score++;
            scoreEl.innerText = score;

            // 최고 점수 업데이트 및 캐시 저장
            if (score > bestScore) {
                bestScore = score;
                bestEl.innerText = bestScore;
                localStorage.setItem('starBestScore', bestScore);
            }

            // 레벨업 기준: 100개로 조정
            const newLevel = Math.floor(score / 100) + 1;
            if (newLevel !== level) {
                level = newLevel;
                levelEl.innerText = level;
            }
        }

        function handleInput(e) {
            mouse.active = true;
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            mouse.x = clientX - rect.left;
            mouse.y = clientY - rect.top;
        }

        window.addEventListener('mousedown', (e) => { handleInput(e); mouse.active = true; });
        window.addEventListener('mousemove', (e) => { if(mouse.active) handleInput(e); });
        window.addEventListener('touchstart', (e) => { handleInput(e); mouse.active = true; }, {passive: false});
        window.addEventListener('touchmove', (e) => { 
            e.preventDefault(); 
            handleInput(e); 
        }, { passive: false });
        
        const stopInput = () => { mouse.active = false; mouse.x = null; mouse.y = null; };
        window.addEventListener('mouseup', stopInput);
        window.addEventListener('touchend', stopInput);

        function animate() {
            ctx.fillStyle = 'rgba(2, 2, 10, 0.25)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 생성 빈도 조절
            const spawnChance = 0.015 + (level * 0.003);
            if (Math.random() < Math.min(spawnChance, 0.08)) {
                fallingStars.push(new FallingStar());
            }

            fallingStars.forEach((star, i) => {
                star.update();
                star.draw();
                if (star.y > canvas.height + 50) fallingStars.splice(i, 1);
            });

            debris.forEach((p, i) => {
                p.update();
                p.draw();
                if (p.life <= 0) debris.splice(i, 1);
            });

            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
