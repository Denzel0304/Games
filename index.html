<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Healing Games</title>
    <style>
        :root {
            --bg-color: #e3f2fd;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-sub: #7f8c8d;
            --neon-purple: #9c27b0;
            --ohh1-blue: #2196f3; /* Oh h1 포인트 컬러 */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Pretendard', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            margin-top: 50px;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            color: #1a3a5a;
            margin: 0;
            letter-spacing: -1px;
        }

        p {
            font-size: 14px;
            color: var(--text-sub);
            margin-top: 8px;
        }

        .date-badge {
            margin-top: 20px;
            background: white;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 14px;
            color: #546e7a;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            font-weight: 600;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 30px 20px;
            width: 100%;
            max-width: 380px;
            box-sizing: border-box;
        }

        .menu-card {
            background: var(--card-bg);
            border-radius: 24px;
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 6px 12px rgba(0,0,0,0.04);
            border: 1px solid rgba(255,255,255,0.6);
            position: relative;
        }

        .menu-card:active {
            transform: scale(0.96);
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .icon-box {
            width: 55px;
            height: 55px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .card-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
        }

        /* 별 가르기 스타일 */
        .star-game { border-top: 4px solid #ffeb3b; }
        .star-game .icon-box { background-color: #fff9c4; }

        /* 테트리스 스타일 */
        .tetris-game { border-top: 4px solid var(--neon-purple); }
        .tetris-game .icon-box { background-color: #f3e5f5; }
        .tetris-game .card-title { color: #4a148c; }

        /* Oh h1 스타일 추가 */
        .ohh1-game { border-top: 4px solid var(--ohh1-blue); }
        .ohh1-game .icon-box { background-color: #e3f2fd; }
        .ohh1-game .card-title { color: #1565c0; }

        /* 준비 중 스타일 */
        .preparing { border-top: 4px solid #cfd8dc; opacity: 0.8; }
        .preparing .icon-box { background-color: #eceff1; }
        .preparing .card-title { color: #90a4ae; }

        .status-tag {
            font-size: 10px;
            margin-top: 4px;
            color: #b0bec5;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <header>
        <h1>Healing Games</h1>
        <p>오늘도 마음을 비우고, 가볍게 즐기세요.</p>
        <div class="date-badge" id="current-date">2026년 4월 4일 (토)</div>
    </header>

    <div class="container">
        <a href="Stars.html" class="menu-card star-game">
            <div class="icon-box">✨</div>
            <div class="card-title">별 가르기</div>
        </a>

        <a href="Tetris.html" class="menu-card tetris-game">
            <div class="icon-box">🧱</div>
            <div class="card-title">네온 테트리스</div>
            <div class="status-tag" style="color: var(--neon-purple); font-weight: 600;">NEW</div>
        </a>

        <a href="0hh1.html" class="menu-card ohh1-game">
            <div class="icon-box">🔵</div>
            <div class="card-title">Oh h1</div>
            <div class="status-tag" style="color: var(--ohh1-blue); font-weight: 600;">PUZZLE</div>
        </a>

        <div class="menu-card preparing">
            <div class="icon-box">☁️</div>
            <div class="card-title">준비 중</div>
            <div class="status-tag">Coming Soon</div>
        </div>
    </div>

    <script>
        const d = new Date();
        const week = ['일', '월', '화', '수', '목', '금', '토'];
        const dateStr = `${d.getFullYear()}년 ${d.getMonth() + 1}월 ${d.getDate()}일 (${week[d.getDay()]})`;
        document.getElementById('current-date').innerText = dateStr;
    </script>
</body>
</html>
